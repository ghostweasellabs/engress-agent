name: release
on:
  push:
    branches: [main]
    tags: ['v*']

env:
  MODULE_PATH: github.com/ghostweasellabs/engress-agent
  BINARY_PATH: ./cmd/engress-agent
  IMAGE_NAME: engress-agent

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Compute image tags and build version
        id: meta
        run: |
          SHA="$(git rev-parse --short HEAD)"
          echo "sha_tag=${SHA}" >> "$GITHUB_OUTPUT"
          echo "commit=${SHA}" >> "$GITHUB_OUTPUT"
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "semver_tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${SHA}" >> "$GITHUB_OUTPUT"
          fi

      - name: Mint GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: Iv23liJ0cYa8efo330No
          private-key: ${{ secrets.ENGRESS_CI_APP_PRIVATE_KEY }}
          owner: ghostweasellabs
          permission-contents: read

      - name: Select module access token
        id: module-token
        env:
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
          ORG_TOKEN: ${{ secrets.ENGRESS_ORG_READ_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TOKEN="${APP_TOKEN:-${ORG_TOKEN:-$GITHUB_TOKEN}}"
          echo "::add-mask::${TOKEN}"
          echo "token=${TOKEN}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (git-short-sha tag, always)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            MODULE_PATH=${{ env.MODULE_PATH }}
            BINARY_PATH=${{ env.BINARY_PATH }}
            VERSION=${{ steps.meta.outputs.version }}
            COMMIT=${{ steps.meta.outputs.commit }}
          secrets: |
            github_token=${{ steps.module-token.outputs.token }}
          tags: ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.sha_tag }}

      - name: Build and push (semver tag, tagged releases only)
        if: steps.meta.outputs.semver_tag != ''
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            MODULE_PATH=${{ env.MODULE_PATH }}
            BINARY_PATH=${{ env.BINARY_PATH }}
            VERSION=${{ steps.meta.outputs.version }}
            COMMIT=${{ steps.meta.outputs.commit }}
          secrets: |
            github_token=${{ steps.module-token.outputs.token }}
          tags: ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.semver_tag }}

  binaries:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ vars.ENGRESS_CI_APP_CLIENT_ID }}
          private-key: ${{ secrets.ENGRESS_CI_APP_PRIVATE_KEY }}
          owner: ghostweasellabs
          repositories: engress-sdk
          permission-contents: read

      - name: Configure private module access
        run: |
          git config --global url."https://x-access-token:${TOKEN}@github.com/".insteadOf "https://github.com/"
          echo "GOPRIVATE=github.com/ghostweasellabs/*" >> "$GITHUB_ENV"
          echo "GONOSUMDB=github.com/ghostweasellabs/*" >> "$GITHUB_ENV"
        env:
          TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Build all platforms
        env:
          CGO_ENABLED: "0"
        run: |
          LDFLAGS="$(scripts/version-ldflags.sh)"
          mkdir -p dist
          for os in linux darwin windows; do
            for arch in amd64 arm64; do
              ext=""; [ "$os" = "windows" ] && ext=".exe"
              out="dist/engress-agent_${GITHUB_REF_NAME}_${os}_${arch}${ext}"
              echo "building $out"
              GOOS="$os" GOARCH="$arch" go build -ldflags "$LDFLAGS" -o "$out" ./cmd/engress-agent
            done
          done
          (cd dist && sha256sum * > SHA256SUMS)

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*
