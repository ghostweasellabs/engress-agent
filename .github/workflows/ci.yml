name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    uses: ghostweasellabs/engress-os/.github/workflows/go-service-ci.yml@main
    secrets:
      ENGRESS_CI_APP_PRIVATE_KEY: ${{ secrets.ENGRESS_CI_APP_PRIVATE_KEY }}
    with:
      module-path: github.com/ghostweasellabs/engress-agent
      binary-path: ./cmd/engress-agent
