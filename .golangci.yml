run:
  timeout: 5m

linters:
  disable-all: true
  enable:
    - staticcheck
    - govet
    - errcheck
    - gocyclo
    - funlen
    - unused

linters-settings:
  gocyclo:
    min-complexity: 15
  funlen:
    lines: 80
    statements: 50

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - funlen
        - gocyclo
